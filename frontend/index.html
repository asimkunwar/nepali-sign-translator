<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanketAI - Nepali Sign Language Translator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <h1>🇳🇵 SanketAI</h1>
        <p>Real-Time Nepali Sign Language Translator</p>
    </header>

    <main class="dashboard">
        <section class="video-panel">
            <div class="card-header">
                <h3>लाइभ क्यामेरा (Live Video Stream)</h3>
            </div>
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>
            <div class="controls">
                <button id="start-btn" class="btn btn-start">क्यामेरा अन गर्नुहोस् (Start Camera)</button>
            </div>
        </section>

        <section class="translation-panel">
            <div class="card-header">
                <h3>अनुवाद नतिजा (Translation Output)</h3>
            </div>
            <div class="result-box">
                <span id="nepali-text" class="placeholder-text">कम्प्युटर स्क्रिनको अगाडि हात लैजानुहोस्</span>
            </div>
            <div class="meta-data">
                <p>निश्चितता (Confidence): <strong id="confidence-score">0%</strong></p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>
</html>
